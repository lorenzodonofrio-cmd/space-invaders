<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozart Space Invaders</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
}

h1{
    margin-top:10px;
    color:#FFD700;
}

canvas{
    background:#111;
    border:3px solid gold;
    display:block;
    margin:10px auto;
}

#scoreBox{
    font-size:24px;
    margin-bottom:10px;
}

#restartBtn{
    display:none;
    padding:12px 25px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
    margin-top:20px;
}

#restartBtn:hover{
    background:orange;
}

</style>
</head>
<body>

<h1>🎼 MOZART SPACE INVADERS 🎼</h1>

<div id="scoreBox">
    Punteggio: <span id="score">0</span>
</div>

<canvas id="gameCanvas" width="950" height="600"></canvas>

<button id="restartBtn">🔄 Ricomincia</button>

<!-- MUSICA CLASSICA DI SOTTOFONDO -->
<audio id="bgMusic" loop>
    <!-- INSERISCI QUI IL FILE -->
    <source src="mozart.mp3" type="audio/mpeg">
</audio>

<!-- SUONO COLPO -->
<audio id="hitSound">
    <!-- INSERISCI QUI IL FILE -->
    <source src="classical-hit.mp3" type="audio/mpeg">
</audio>

<!-- SUONO VITTORIA -->
<audio id="winSound">
    <!-- INSERISCI QUI IL FILE -->
    <source src="acdc-rock.mp3" type="audio/mpeg">
</audio>

<!-- SUONO SCONFITTA -->
<audio id="loseSound">
    <!-- INSERISCI QUI IL FILE -->
    <source src="peppapig.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const restartBtn = document.getElementById("restartBtn");

// AUDIO
const bgMusic = document.getElementById("bgMusic");
const hitSound = document.getElementById("hitSound");
const winSound = document.getElementById("winSound");
const loseSound = document.getElementById("loseSound");

let player;
let bullets;
let enemies;
let enemyDirection;
let score;
let gameOver;
let gameWon;

let keys = {};

// AVVIO GIOCO
function initGame(){

    player = {
        x: canvas.width / 2 - 35,
        y: canvas.height - 90,
        width: 70,
        height: 70,
        speed: 8
    };

    bullets = [];
    enemies = [];
    enemyDirection = 1;

    score = 0;
    gameOver = false;
    gameWon = false;

    scoreEl.textContent = score;

    restartBtn.style.display = "none";

    // CREA NEMICI MUSICALI
    for(let row=0; row<4; row++){

        for(let col=0; col<8; col++){

            const symbols = ["𝄞","𝄢","🎼"];

            enemies.push({
                x: 90 + col * 90,
                y: 60 + row * 70,
                width: 50,
                height: 50,
                alive:true,
                symbol:symbols[Math.floor(Math.random()*symbols.length)]
            });

        }
    }

    // MUSICA DI SOTTOFONDO
    bgMusic.currentTime = 0;
    bgMusic.play();

    gameLoop();
}

// CONTROLLI
document.addEventListener("keydown",(e)=>{

    keys[e.key] = true;

    // SPARO NOTE MUSICALI
    if(e.key === " " && !gameOver){

        bullets.push({
            x: player.x + 25,
            y: player.y,
            speed: 10,
            symbol:"♪"
        });

    }

});

document.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

// MOVIMENTO
function movePlayer(){

    if(keys["ArrowLeft"] && player.x > 0){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"] &&
       player.x + player.width < canvas.width){

        player.x += player.speed;
    }
}

// DISEGNA MOZART
function drawPlayer(){

    // CAPELLI
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(player.x + 35, player.y + 25, 28, 0, Math.PI*2);
    ctx.fill();

    // VISO
    ctx.fillStyle = "#FFD39B";
    ctx.beginPath();
    ctx.arc(player.x + 35, player.y + 25, 20, 0, Math.PI*2);
    ctx.fill();

    // OCCHI
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(player.x + 28, player.y + 22, 2, 0, Math.PI*2);
    ctx.arc(player.x + 42, player.y + 22, 2, 0, Math.PI*2);
    ctx.fill();

    // BOCCA
    ctx.beginPath();
    ctx.arc(player.x + 35, player.y + 30, 5, 0, Math.PI);
    ctx.strokeStyle = "black";
    ctx.stroke();

    // CORPO
    ctx.fillStyle = "red";
    ctx.fillRect(player.x + 18, player.y + 45, 35, 30);

}

// DISEGNA COLPI
function drawBullets(){

    ctx.fillStyle = "yellow";
    ctx.font = "30px Arial";

    bullets.forEach((bullet,index)=>{

        bullet.y -= bullet.speed;

        ctx.fillText(
            bullet.symbol,
            bullet.x,
            bullet.y
        );

        if(bullet.y < 0){
            bullets.splice(index,1);
        }

    });
}

// DISEGNA NEMICI
function drawEnemies(){

    let moveDown = false;

    ctx.font = "42px Arial";

    enemies.forEach(enemy=>{

        if(!enemy.alive) return;

        enemy.x += enemyDirection;

        if(enemy.x + enemy.width > canvas.width ||
           enemy.x < 0){

            moveDown = true;
        }

        ctx.fillStyle = "cyan";

        ctx.fillText(
            enemy.symbol,
            enemy.x,
            enemy.y
        );

    });

    if(moveDown){

        enemyDirection *= -1;

        enemies.forEach(enemy=>{
            enemy.y += 20;
        });

    }
}

// COLLISIONI
function checkCollisions(){

    bullets.forEach((bullet,bulletIndex)=>{

        enemies.forEach(enemy=>{

            if(
                enemy.alive &&
                bullet.x < enemy.x + enemy.width &&
                bullet.x + 20 > enemy.x &&
                bullet.y < enemy.y + enemy.height &&
                bullet.y + 20 > enemy.y
            ){

                enemy.alive = false;

                bullets.splice(bulletIndex,1);

                score += 10;

                scoreEl.textContent = score;

                // SUONO COLPO CLASSICO
                hitSound.currentTime = 0;
                hitSound.play();

            }

        });

    });

}

// CONTROLLO VITTORIA
function checkWin(){

    const aliveEnemies = enemies.filter(e => e.alive);

    if(aliveEnemies.length === 0){

        gameWon = true;
        gameOver = true;

        bgMusic.pause();

        // SUONO ROCK ACDC
        winSound.play();
    }

}

// GAME OVER
function checkGameOver(){

    enemies.forEach(enemy=>{

        if(enemy.alive &&
           enemy.y + enemy.height >= player.y){

            gameOver = true;

            bgMusic.pause();

            // SUONO PEPPA PIG
            loseSound.play();
        }

    });

}

// SCHERMATA FINALE
function drawEndScreen(){

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";

    if(gameWon){

        ctx.fillText(
            "🎸 HAI VINTO! 🎸",
            250,
            250
        );

    } else {

        ctx.fillText(
            "🐷 GAME OVER 🐷",
            220,
            250
        );
    }

    ctx.font = "28px Arial";

    ctx.fillText(
        "Premi il pulsante per ricominciare",
        220,
        320
    );

    restartBtn.style.display = "inline-block";
}

// LOOP PRINCIPALE
function gameLoop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(gameOver){

        drawEndScreen();
        return;
    }

    movePlayer();

    drawPlayer();

    drawBullets();

    drawEnemies();

    checkCollisions();

    checkWin();

    checkGameOver();

    requestAnimationFrame(gameLoop);
}

// RICOMINCIA
restartBtn.addEventListener("click",()=>{

    // FERMA AUDIO
    winSound.pause();
    loseSound.pause();

    winSound.currentTime = 0;
    loseSound.currentTime = 0;

    initGame();

});

// AVVIO
initGame();

</script>

</body>
</html>
