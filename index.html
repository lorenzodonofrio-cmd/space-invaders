<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozart Space Invaders</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    color:gold;
    margin-top:10px;
}

canvas{
    background:#111;
    border:3px solid gold;
    display:block;
    margin:10px auto;
}

#info{
    display:flex;
    justify-content:center;
    gap:50px;
    font-size:24px;
    margin-bottom:10px;
}

#restartBtn{
    display:none;
    padding:12px 25px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
    margin-top:20px;
}

#restartBtn:hover{
    background:orange;
}

</style>
</head>
<body>

<h1>🎼 MOZART SPACE INVADERS 🎼</h1>

<div id="info">
    <div>Punteggio: <span id="score">0</span></div>
    <div>Livello: <span id="level">1</span></div>
</div>

<canvas id="gameCanvas" width="1000" height="650"></canvas>

<button id="restartBtn">🔄 Ricomincia</button>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const restartBtn = document.getElementById("restartBtn");

// ==========================
// AUDIO
// ==========================

const bgMusic = new Audio("assets/sottofondo.mp3");
const hitSound = new Audio("assets/colpo.zip");
const loseSound = new Audio("assets/perdita.mp3");
const winSound = new Audio("assets/vincita.mp3");

bgMusic.loop = true;

// ==========================
// VARIABILI
// ==========================

let player;
let bullets;
let enemies;

let enemyDirection;
let enemySpeed;

let score;
let level;

let gameOver;
let gameWon;

let keys = {};

// ==========================
// INIZIALIZZA GIOCO
// ==========================

function initGame(){

    score = 0;
    level = 1;

    scoreEl.textContent = score;
    levelEl.textContent = level;

    gameOver = false;
    gameWon = false;

    restartBtn.style.display = "none";

    enemySpeed = 1;

    createPlayer();
    createLevel();

    bgMusic.currentTime = 0;
    bgMusic.play();

    gameLoop();
}

// ==========================
// CREA PLAYER
// ==========================

function createPlayer(){

    player = {
        x: canvas.width / 2 - 40,
        y: canvas.height - 100,
        width: 80,
        height: 80,
        speed: 8
    };

}

// ==========================
// CREA LIVELLO
// ==========================

function createLevel(){

    bullets = [];
    enemies = [];

    enemyDirection = enemySpeed;

    for(let row=0; row<4; row++){

        for(let col=0; col<8; col++){

            const symbols = ["𝄞","𝄢","🎼"];

            enemies.push({
                x: 90 + col * 100,
                y: 60 + row * 80,
                width: 50,
                height: 50,
                alive:true,
                symbol:symbols[Math.floor(Math.random()*symbols.length)]
            });

        }

    }

}

// ==========================
// CONTROLLI
// ==========================

document.addEventListener("keydown",(e)=>{

    keys[e.key] = true;

    if(e.key === " " && !gameOver){

        bullets.push({
            x: player.x + 30,
            y: player.y,
            speed: 10,
            symbol:"♪"
        });

    }

});

document.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

// ==========================
// MOVIMENTO
// ==========================

function movePlayer(){

    if(keys["ArrowLeft"] && player.x > 0){

        player.x -= player.speed;

    }

    if(
        keys["ArrowRight"] &&
        player.x + player.width < canvas.width
    ){

        player.x += player.speed;

    }

}

// ==========================
// MOZART CAMBIA FORMA
// ==========================

function drawPlayer(){

    // LIVELLO 1
    if(level === 1){

        drawMozartClassic();

    }

    // LIVELLO 2
    else if(level === 2){

        drawMozartRock();

    }

    // LIVELLO 3+
    else{

        drawMozartSuper();

    }

}

// MOZART CLASSICO
function drawMozartClassic(){

    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.arc(player.x+40, player.y+25, 30, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#FFD39B";

    ctx.beginPath();
    ctx.arc(player.x+40, player.y+25, 22, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "red";

    ctx.fillRect(player.x+20, player.y+50, 40, 30);

}

// MOZART ROCK
function drawMozartRock(){

    ctx.fillStyle = "purple";

    ctx.beginPath();
    ctx.arc(player.x+40, player.y+25, 35, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#FFD39B";

    ctx.beginPath();
    ctx.arc(player.x+40, player.y+25, 24, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "black";

    ctx.fillRect(player.x+18, player.y+50, 45, 30);

    ctx.fillStyle = "yellow";
    ctx.fillText("⚡", player.x+25, player.y+35);

}

// MOZART SUPER
function drawMozartSuper(){

    ctx.fillStyle = "cyan";

    ctx.beginPath();
    ctx.arc(player.x+40, player.y+25, 38, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#FFD39B";

    ctx.beginPath();
    ctx.arc(player.x+40, player.y+25, 24, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "gold";

    ctx.fillRect(player.x+15, player.y+50, 50, 30);

    ctx.font = "30px Arial";

    ctx.fillText("🔥", player.x+18, player.y+35);

}

// ==========================
// PROIETTILI
// ==========================

function drawBullets(){

    ctx.fillStyle = "yellow";
    ctx.font = "30px Arial";

    bullets.forEach((bullet,index)=>{

        bullet.y -= bullet.speed;

        ctx.fillText(
            bullet.symbol,
            bullet.x,
            bullet.y
        );

        if(bullet.y < 0){

            bullets.splice(index,1);

        }

    });

}

// ==========================
// NEMICI
// ==========================

function drawEnemies(){

    let moveDown = false;

    ctx.font = "42px Arial";

    enemies.forEach(enemy=>{

        if(!enemy.alive) return;

        enemy.x += enemyDirection;

        if(
            enemy.x + enemy.width > canvas.width ||
            enemy.x < 0
        ){

            moveDown = true;

        }

        ctx.fillStyle = "cyan";

        ctx.fillText(
            enemy.symbol,
            enemy.x,
            enemy.y
        );

    });

    if(moveDown){

        enemyDirection *= -1;

        enemies.forEach(enemy=>{

            enemy.y += 20;

        });

    }

}

// ==========================
// COLLISIONI
// ==========================

function checkCollisions(){

    bullets.forEach((bullet,bulletIndex)=>{

        enemies.forEach(enemy=>{

            if(
                enemy.alive &&
                bullet.x < enemy.x + enemy.width &&
                bullet.x + 20 > enemy.x &&
                bullet.y < enemy.y + enemy.height &&
                bullet.y + 20 > enemy.y
            ){

                enemy.alive = false;

                bullets.splice(bulletIndex,1);

                score += 10;

                scoreEl.textContent = score;

                hitSound.currentTime = 0;
                hitSound.play();

            }

        });

    });

}

// ==========================
// LIVELLI
// ==========================

function checkLevelComplete(){

    const aliveEnemies =
        enemies.filter(enemy => enemy.alive);

    // NUOVO LIVELLO
    if(aliveEnemies.length === 0){

        level++;

        levelEl.textContent = level;

        // PIÙ VELOCE
        enemySpeed += 1;

        // SUONO VITTORIA LIVELLO
        winSound.currentTime = 0;
        winSound.play();

        // CREA NUOVI NEMICI
        createLevel();

    }

    // VITTORIA FINALE
    if(level > 5){

        gameWon = true;
        gameOver = true;

    }

}

// ==========================
// GAME OVER
// ==========================

function checkGameOver(){

    enemies.forEach(enemy=>{

        if(
            enemy.alive &&
            enemy.y + enemy.height >= player.y
        ){

            gameOver = true;

            bgMusic.pause();

            loseSound.currentTime = 0;
            loseSound.play();

        }

    });

}

// ==========================
// FINE GIOCO
// ==========================

function drawEndScreen(){

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";

    if(gameWon){

        ctx.fillText(
            "🎸 HAI VINTO IL GIOCO! 🎸",
            150,
            250
        );

    } else {

        ctx.fillText(
            "💀 GAME OVER 💀",
            250,
            250
        );

    }

    ctx.font = "30px Arial";

    ctx.fillText(
        "Premi il pulsante per ricominciare",
        230,
        330
    );

    restartBtn.style.display = "inline-block";

}

// ==========================
// LOOP PRINCIPALE
// ==========================

function gameLoop(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(gameOver){

        drawEndScreen();

        return;

    }

    movePlayer();

    drawPlayer();

    drawBullets();

    drawEnemies();

    checkCollisions();

    checkLevelComplete();

    checkGameOver();

    requestAnimationFrame(gameLoop);

}

// ==========================
// RICOMINCIA
// ==========================

restartBtn.addEventListener("click",()=>{

    winSound.pause();
    loseSound.pause();

    winSound.currentTime = 0;
    loseSound.currentTime = 0;

    initGame();

});

// ==========================
// START
// ==========================

initGame();

</script>

</body>
</html>
